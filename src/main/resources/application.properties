spring.application.name=UrutiBot
app.about-company-file=classpath:urutihub.txt

### PostgreSQL / JPA
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

### HikariCP — production-grade connection pool tuning
# Sized for ~20 concurrent DB-bound requests; raise if Tomcat threads back up
# waiting on a connection (visible via /actuator/metrics/hikaricp.connections.pending).
spring.datasource.hikari.pool-name=UrutiBotHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=30000

### JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=${LOG_SQL:false}
spring.jpa.properties.hibernate.format_sql=${LOG_SQL:false}


spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.generate_statistics=${HIBERNATE_STATS:false}

### Spring Cache — Caffeine-backed
# Per-cache TTL and size are configured programmatically in CacheConfig so that
# volatile rows (appointments) don't inherit the long TTL of static seed data
# (roles/permissions). Stats are recorded on every cache for /actuator/caches
# and the periodic hit-rate log line emitted by CacheConfig.
spring.cache.type=caffeine

### Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

### JWT
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.security.jwt.issuer=urutibot

### Admin bootstrap (seeded once at startup by AdminBootstrap when DB is empty)
app.admin.bootstrap.email=${ADMIN_EMAIL:}
app.admin.bootstrap.password=${ADMIN_PASSWORD:}
app.admin.bootstrap.full-name=${ADMIN_FULL_NAME:Administrator}

### LangChain4J Configuration for Anthropic Chat Model
langchain4j.anthropic.chat-model.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.chat-model.temperature=0.0
langchain4j.anthropic.chat-model.timeout=PT60S
langchain4j.anthropic.chat-model.log-requests=false
langchain4j.anthropic.chat-model.log-responses=false

### LangChain4J Streaming Chat Model (Anthropic)
langchain4j.anthropic.streaming-chat-model.api-key=${ANTHROPIC_API_KEY}
langchain4j.anthropic.streaming-chat-model.model-name=claude-sonnet-4-20250514
langchain4j.anthropic.streaming-chat-model.temperature=0.0
langchain4j.anthropic.streaming-chat-model.timeout=PT60S

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${APP_EMAIL_USERNAME}
spring.mail.password=${APP_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# SMTP timeouts — without these a hung Gmail handshake blocks the mail thread
# pool indefinitely. 10s is generous for STARTTLS on healthy networks.
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Email Notification Configuration
app.admin.email=aimendayambaje24@gmail.com

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

### Actuator — expose only the endpoints we actively use for ops monitoring
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
