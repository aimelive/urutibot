    <!-- Pre-paint theme: prevent flash by setting data-theme before stylesheets evaluate -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("urutibot.theme");
          var pref =
            stored === "light" || stored === "dark" ? stored : "system";
          var actual =
            pref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.setAttribute("data-theme", actual);
          document.documentElement.setAttribute("data-theme-pref", pref);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.setAttribute("data-theme-pref", "system");
        }
      })();
    </script>

    <!-- Inline critical CSS so the first paint is correct without a network round-trip -->
    <style>
      :root {
        --brand: #008685;
        --brand-strong: #008685;
        --brand-soft: #e6f7f7;
        --bg: #fafbfb;
        --surface: #fff;
        --surface-2: #eef3f3;
        --border: #e1e7e7;
        --text: #0e1414;
        --text-muted: #4b5b5b;
        --link: #007a79;
        --link-hover: #005a59;
        --danger: #b3261e;
        --success: #1f7a3a;
        --shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 24px 48px -12px rgba(0, 0, 0, 0.1);
        --radius: 18px;
      }
      :root[data-theme="dark"] {
        --brand: #2dc8c7;
        --brand-strong: #5cdcdb;

        --bg: #0a0e0f;

        --shadow-lg: 0 24px 48px -12px rgba(0, 0, 0, 0.6);
      }
      *,

      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100%;
      }
      body {
        font-family:

        line-height: 1.55;

        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        color: var(--link-hover);
        text-decoration: underline;
      }
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .page-main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
      }
      .page-footer {
        padding: 0.85rem 1.25rem;
        border-top: 1px solid var(--border);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>

    <main class="page-main">
      <div class="stage">
        <div class="welcome">
          <h1 class="welcome-logo">
            <img src="/logo.svg" alt="UrutiHub" decoding="async" />
            <!-- Visually-hidden text gives the H1 a real semantic value
                 ("UrutiHub UrutiBot") that matches the page <title> and
                 reinforces the brand keyword for search engines. -->
            <span class="visually-hidden">UrutiBot</span>
          </h1>
          <p class="welcome-sub">
            Your assistant from UrutiHub. Ask me anything about our services or
            book a free appointment.
          </p>
        </div>

        <section
          id="chat"
          class="chat-card"
          role="region"
          aria-label="Chat with UrutiBot"
        >
          <header class="chat-card-header">
            <span class="bot-avatar" aria-hidden="true">U</span>
            <div class="chat-card-id">
              <span class="chat-card-name">UrutiBot</span>
              <span class="chat-card-meta">
                <span class="chat-card-status" aria-hidden="true"></span>
                <span class="chat-card-status-text">Online</span>
                <span
                  class="chat-card-sep"
                  data-chat-email-sep
                  aria-hidden="true"
                  hidden
                  >·</span
                >
                <span
                  class="chat-card-email"
                  data-chat-email-display
                  hidden
                ></span>
              </span>
            </div>
            <button
              type="button"
              class="btn-new-chat"
              data-chat-reset
              hidden
              aria-label="Start a new conversation. This permanently clears the current chat history."
              title="Start a new conversation - this permanently clears your current chat history."
            >
              <svg
                viewBox="0 0 24 24"
                width="14"
                height="14"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  d="M12 5v14M5 12h14"
                  stroke="currentColor"
                  stroke-width="2.4"
                  stroke-linecap="round"
                />
              </svg>
              <span>New chat</span>
            </button>
          </header>

          <!-- Pre-chat email gate: empty-state hero + docked input that
               mirrors the chat composer position, so it reads as a
               placeholder for the live conversation. -->
          <form class="chat-prechat" data-chat-prechat novalidate>
            <div class="prechat-hero">
             
              <h2 class="prechat-hero-title">Hi! I'm UrutiBot</h2>
              <p class="prechat-hero-sub">
                Pop in your email first so I can remember our chat- that's it.
              </p>
            </div>
            <div class="prechat-dock">
              <label class="visually-hidden" for="chat-email"
                >Email address</label
              >
              <div class="prechat-row">
                <input
                  id="chat-email"
                  type="email"
                  name="memoryId"
                  autocomplete="email"
                  inputmode="email"
                  required
                  placeholder="info@urutihub.com"
                  data-chat-email
                />
                <button
                  type="submit"
                  class="btn btn-primary btn-icon"
                  aria-label="Start chat"
                >
                  <svg
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <path
                      d="M5 12h14M13 6l6 6-6 6"
                      stroke="currentColor"
                      stroke-width="2.4"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      fill="none"
                    />
                  </svg>
                </button>
              </div>
              <p
                class="form-error"
                data-chat-prechat-error
                hidden
                role="alert"
              ></p>
            </div>
          </form>

          <!-- Conversation -->
          <div class="chat-conversation" data-chat-conversation hidden>
            <div
              class="chat-log"
              data-chat-log
              role="log"
              aria-live="polite"
              aria-relevant="additions"
              aria-label="Conversation history"
            ></div>

            <div class="chat-error" data-chat-error hidden role="alert">
              <p data-chat-error-msg></p>
              <button
                type="button"
                class="btn btn-secondary btn-sm"
                data-chat-retry
              >
                Retry
              </button>
            </div>

            <form class="chat-composer" data-chat-form>
              <label class="visually-hidden" for="chat-input"
                >Your message</label
              >
              <textarea
                id="chat-input"
                data-chat-input
                rows="1"
                placeholder="Type your message…"
                autocomplete="off"
                maxlength="2000"
                required
              ></textarea>
              <button
                type="submit"
                class="btn btn-primary btn-icon"
                data-chat-send
                aria-label="Send message"
              >
                <svg
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path d="M3 11l18-8-8 18-2-8-8-2Z" fill="currentColor" />
                </svg>
              </button>
              <button
                type="button"
                class="btn btn-danger btn-icon"
                data-chat-stop
                hidden
                aria-label="Stop streaming"
              >
                <svg
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  aria-hidden="true"
                  focusable="false"
                >
                  <rect
                    x="6"
                    y="6"
                    width="12"
                    height="12"
                    rx="2"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </form>
          </div>
        </section>
      </div>
    </main>

    <footer class="page-footer">

    </footer>

    <script src="/js/chat.js" defer></script>
