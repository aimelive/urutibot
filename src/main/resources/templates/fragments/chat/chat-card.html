<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <section
    th:fragment="chat-card"
    id="chat"
    class="chat-card"
    role="region"
    aria-label="Chat with UrutiBot"
  >
    <header class="chat-card-header">
      <span class="bot-avatar" aria-hidden="true">U</span>
      <div class="chat-card-id">
        <span class="chat-card-name">UrutiBot</span>
        <span class="chat-card-meta">
          <span class="chat-card-status" aria-hidden="true"></span>
          <span class="chat-card-status-text" data-chat-status-text>Online</span>
          <span class="chat-card-sep" data-chat-email-sep aria-hidden="true" hidden>·</span>
          <span class="chat-card-email" data-chat-email-display hidden></span>
        </span>
      </div>
      <button
        type="button"
        class="btn-new-chat"
        data-chat-reset
        aria-label="Start a new conversation. This permanently clears the current chat history."
        title="Start a new conversation - this permanently clears your current chat history."
      >
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor"
                stroke-width="2.4" stroke-linecap="round" />
        </svg>
        <span>New chat</span>
      </button>
    </header>

    <div class="chat-conversation" data-chat-conversation>
      <div
        class="chat-log"
        data-chat-log
        role="log"
        aria-live="polite"
        aria-relevant="additions"
        aria-label="Conversation history"
      ></div>

      <div class="chat-error" data-chat-error hidden role="alert">
        <p data-chat-error-msg></p>
        <button type="button" class="btn btn-secondary btn-sm" data-chat-retry>
          Retry
        </button>
      </div>

      <form class="chat-composer" data-chat-form>
        <label class="visually-hidden" for="chat-input">Your message</label>
        <textarea
          id="chat-input"
          data-chat-input
          rows="1"
          placeholder="Type your message…"
          autocomplete="off"
          maxlength="2000"
          required
        ></textarea>
        <button
          type="submit"
          class="btn btn-primary btn-icon"
          data-chat-send
          aria-label="Send message"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M3 11l18-8-8 18-2-8-8-2Z" fill="currentColor" />
          </svg>
        </button>
        <button
          type="button"
          class="btn btn-danger btn-icon"
          data-chat-stop
          hidden
          aria-label="Stop streaming"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
          </svg>
        </button>
      </form>

      <p class="composer-hint" data-anon-hint hidden>
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path
            d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm.9 5.5a1 1 0 1 0-1.8 0 1 1 0 0 0 1.8 0ZM11 11h2v6h-2z"
            fill="currentColor"
          />
        </svg>
        <span>
          Messages aren't saved.
          <button type="button" class="composer-hint__cta" data-action="open-login">
            Sign in
          </button>
          to save your conversation.
        </span>
      </p>
    </div>
  </section>
</body>
</html>
