<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
  <div
    th:fragment="my-appointments-modal"
    class="modal"
    data-modal="my-appointments"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="my-apts-title"
  >
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-panel modal-panel--wide">
      <button type="button" class="modal-close" data-modal-close aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor"
                stroke-width="2.2" stroke-linecap="round" />
        </svg>
      </button>

      <div class="modal-head">
        <div>
          <h2 class="modal-title" id="my-apts-title">My appointments</h2>
          <p class="modal-subtitle">Manage upcoming sessions with our team.</p>
        </div>
        <button type="button" class="btn btn-primary btn-sm"
                data-action="open-create-appointment">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke="currentColor"
                  stroke-width="2.4" stroke-linecap="round" />
          </svg>
          New booking
        </button>
      </div>

      <div class="apt-list" data-my-appointments-list>
        <div class="apt-empty" data-list-empty hidden>
          <p>You don't have any appointments yet.</p>
        </div>
        <div class="apt-loading" data-list-loading hidden>
          <div class="spinner spinner--lg"></div>
          <span>Loading appointments…</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
