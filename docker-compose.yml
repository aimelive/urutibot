services:
  urutibot:
    build:
      context: .
      dockerfile: Dockerfile
    image: urutibot:local
    container_name: urutibot
    restart: unless-stopped
    expose:
      - "8080"

    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APP_EMAIL_USERNAME: ${APP_EMAIL_USERNAME}
      APP_EMAIL_PASSWORD: ${APP_EMAIL_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_ABOUT_COMPANY_FILE: ${APP_ABOUT_COMPANY_FILE:-file:/app/urutihub.txt}
      JAVA_OPTS: >-
        ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0
        -XX:+UseStringDeduplication
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/urandom}
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s
    volumes:
      - urutibot-tmp:/tmp

    networks:
      - urutibot-net
volumes:
  urutibot-tmp:
    name: urutibot-tmp
networks:
  urutibot-net:
    name: urutibot-net
    driver: bridge
